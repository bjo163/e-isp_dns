# -------------------------------------------------------------------------
# TrustPositif -- Docker Compose  (host-network mode for LXC)
#
# All services use network_mode: host so Docker never touches sysctl
# (required for LXC containers that block ip_unprivileged_port_start).
#
# Port layout on the host:
#   53/udp+tcp   Go DNS server
#   80           Caddy HTTP (Let's Encrypt ACME + blocked-domain intercept)
#   443          Caddy HTTPS (block page + admin API on one domain)
#   3000         Next.js (internal, proxied by Caddy)
#   6379         Redis (internal, localhost only)
#   8080         Fiber admin API (internal, proxied by Caddy)
#   8081         Go HTTP intercept (internal, proxied by Caddy :80)
#
# Quick start:
#   cp .env.example .env   # edit DOMAIN, ACME_EMAIL, JWT_SECRET
#   docker compose up -d --build
# -------------------------------------------------------------------------
name: truspositif

services:

  # -- Redis ----------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: truspositif-redis
    restart: unless-stopped
    network_mode: host
    command: redis-server --save 60 1 --loglevel warning --maxmemory 128mb --maxmemory-policy allkeys-lru --bind 127.0.0.1
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # -- Go DNS + Admin API ---------------------------------------------------
  dns:
    build:
      context: ./dns
      dockerfile: Dockerfile
    container_name: truspositif-dns
    restart: unless-stopped
    network_mode: host
    volumes:
      - dns-data:/app/data
    environment:
      - REDIS_URL=redis://127.0.0.1:6379/0
      - JWT_SECRET=${JWT_SECRET:-trustpositif-secret-change-in-prod}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # -- Next.js Block Page + Admin Panel ------------------------------------
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-https://${DOMAIN:-jahanam.mycocolink.com}}
    container_name: truspositif-web
    restart: unless-stopped
    network_mode: host
    depends_on:
      dns:
        condition: service_healthy
    environment:
      - NODE_ENV=production

  # -- Caddy reverse proxy + automatic TLS ----------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: truspositif-caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-jahanam.mycocolink.com}
      - ACME_EMAIL=${ACME_EMAIL:-admin@mycocolink.com}
    depends_on:
      - dns
      - web

volumes:
  dns-data:
    driver: local
  redis-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
